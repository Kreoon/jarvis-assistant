# Nginx reverse proxy config for Jarvis
# Copy to: /etc/nginx/sites-available/jarvis
# Then: sudo ln -s /etc/nginx/sites-available/jarvis /etc/nginx/sites-enabled/
# Then: sudo certbot --nginx -d your-domain.com
# Then: sudo systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com;  # <-- Change this to your domain or VPS IP

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
